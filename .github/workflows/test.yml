name: Test Harness CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-linux:
    name: Build and Test (Linux GCC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14 ninja-build

      - uses: lukka/get-cmake@latest

      - name: Configure
        run: cmake -B build -G Ninja
        env:
          CC: gcc-14
          CXX: g++-14

      - name: Build
        run: cmake --build build

      - name: Test
        run: |
          # Run directly instead of ctest — the binary may segfault during
          # static destruction (MinGW GMA duplicate) even when all tests pass.
          # Parse output for CppUTest "OK" or "Errors" lines.
          set +e
          OUTPUT=$(./build/HarnessTests 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "^Errors"; then
            echo "::error::Test failures detected"
            exit 1
          fi
          if ! echo "$OUTPUT" | grep -qE "^OK \("; then
            echo "::error::No OK line found in output (exit code $EXIT_CODE)"
            exit 1
          fi
          echo "All tests passed (exit code $EXIT_CODE may be non-zero due to cleanup segfault)"

  test-windows:
    name: Build and Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Configure
        shell: msys2 {0}
        run: cmake -B build -G Ninja

      - name: Build
        shell: msys2 {0}
        run: cmake --build build

      - name: Test
        shell: msys2 {0}
        run: |
          set +e
          OUTPUT=$(./build/HarnessTests.exe 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "^Errors"; then
            echo "::error::Test failures detected"
            exit 1
          fi
          if ! echo "$OUTPUT" | grep -qE "^OK \("; then
            echo "::error::No OK line found in output (exit code $EXIT_CODE)"
            exit 1
          fi
          echo "All tests passed (exit code $EXIT_CODE may be non-zero due to cleanup segfault)"
